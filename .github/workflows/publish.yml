name: Publish

# Publishes @sgtpooki/agent-lock to npm with provenance when a GitHub release is
# published. Authentication is npm Trusted Publishing over OIDC (no NPM_TOKEN):
# configure the trusted publisher for this package at
# https://www.npmjs.com/package/@sgtpooki/agent-lock/access with repo SgtPooki/agent-lock
# and workflow filename publish.yml.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing + provenance requires npm >= 11.5.1; node 20 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm test

      - run: npm publish --provenance --access public
