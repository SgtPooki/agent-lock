name: Release

# Versioning and npm publish for @sgtpooki/agent-lock.
#
# release-please maintains a release PR from Conventional Commits on main. When
# that PR merges, the same run creates the GitHub release and publishes to npm
# with provenance over OIDC (no NPM_TOKEN). The npm trusted publisher is bound to
# this filename (publish.yml), so the publish job must stay in this file:
# https://www.npmjs.com/package/@sgtpooki/agent-lock/access
# Version stays below 1.0.0: features bump the patch, breaking changes bump the
# minor (see release-please-config.json).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing + provenance requires npm >= 11.5.1; node 20 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm test

      - run: npm publish --provenance --access public
